services:
  postgreapi-template:
    image: ${DOCKER_REGISTRY-}postgreapitemplate
    build:
      context: .
      dockerfile: APIServer/Dockerfile
    ports:
      - 8088:8080
  postgres:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: TemplateDB
    volumes:
      - ./db:/var/lib/postgresql
    ports:
      - 5433:5432
networks:
  default:
    name: postgreAPI-network
